services:
  mongo:
    image: mongo:7
    container_name: attendance_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    image: ${DOCKERHUB_USERNAME:-local}/attendance-backend:${TAG:-latest}
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: attendance_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env.example
    environment:
      - MONGO_URI=mongodb://mongo:27017/attendance_db
      - JWT_SECRET=${JWT_SECRET:-attendance-secret}
      - PORT=5000
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    image: ${DOCKERHUB_USERNAME:-local}/attendance-frontend:${TAG:-latest}
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    container_name: attendance_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.27-alpine
    container_name: attendance_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: attendance_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.3.0
    container_name: attendance_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - ./grafana/provisioning/datasources/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    depends_on:
      - prometheus

volumes:
  mongo_data:
